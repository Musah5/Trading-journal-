<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bintastrade Journal</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
            --accent-color: #38bdf8;
            --success-color: #22c55e;
            --danger-color: #ef4444;
            --border-color: #334155;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 15px;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 25px;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 15px;
        }

        header h1 {
            color: var(--accent-color);
            margin: 0;
            font-size: 2rem;
            letter-spacing: 1px;
        }

        header p {
            color: #94a3b8;
            margin-top: 5px;
            font-size: 0.9rem;
        }

        .journal-form {
            background-color: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            margin-bottom: 25px;
            border: 1px solid var(--border-color);
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 15px;
            margin-bottom: 15px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group.full-width {
            grid-column: 1 / -1;
        }

        label {
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 6px;
            color: #cbd5e1;
        }

        input, select, textarea {
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 10px;
            border-radius: 6px;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus, select:focus, textarea:focus {
            border-color: var(--accent-color);
        }

        button.btn-submit {
            background-color: var(--accent-color);
            color: #0f172a;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: 700;
            border-radius: 6px;
            cursor: pointer;
            transition: opacity 0.2s;
            width: 100%;
        }

        .log-container {
            background-color: var(--card-bg);
            border-radius: 12px;
            border: 1px solid var(--border-color);
            overflow: hidden;
        }

        .table-wrapper {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            background-color: #111827;
            color: var(--accent-color);
            padding: 12px;
            font-weight: 600;
            font-size: 0.8rem;
            text-transform: uppercase;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.9rem;
            vertical-align: top;
        }

        .badge {
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 700;
        }

        .badge.buy { background-color: rgba(34, 197, 94, 0.2); color: var(--success-color); }
        .badge.sell { background-color: rgba(239, 68, 68, 0.2); color: var(--danger-color); }
        
        .outcome-win { color: var(--success-color); font-weight: bold; }
        .outcome-loss { color: var(--danger-color); font-weight: bold; }

        .btn-delete {
            background: none;
            border: none;
            color: var(--danger-color);
            cursor: pointer;
            font-weight: bold;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>BINTASTRADE JOURNAL</h1>
        <p>Execution Discipline & Multi-Timeframe Tracker</p>
    </header>

    <div class="journal-form">
        <form id="tradeForm">
            <div class="form-grid">
                <div class="form-group">
                    <label for="date">Date & Time</label>
                    <input type="datetime-local" id="date" required>
                </div>
                <div class="form-group">
                    <label for="pair">Asset / Pair</label>
                    <input type="text" id="pair" placeholder="e.g., EURUSD" required>
                </div>
                <div class="form-group">
                    <label for="direction">Direction</label>
                    <select id="direction" required>
                        <option value="BUY">BUY</option>
                        <option value="SELL">SELL</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="riskReward">R:R Ratio</label>
                    <input type="text" id="riskReward" placeholder="e.g., 1:3" required>
                </div>
                <div class="form-group">
                    <label for="outcome">Outcome</label>
                    <select id="outcome" required>
                        <option value="Win">Win</option>
                        <option value="Loss">Loss</option>
                        <option value="Breakeven">Breakeven</option>
                    </select>
                </div>
                <div class="form-group full-width">
                    <label for="notes">Confluences, HTML/Market Setup & Notes</label>
                    <textarea id="notes" rows="3" placeholder="Order blocks, liquidity sweeps, structural shifts, mindset..."></textarea>
                </div>
            </div>
            <button type="submit" class="btn-submit">Log Position</button>
        </form>
    </div>

    <div class="log-container">
        <div class="table-wrapper">
            <table id="tradeTable">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Pair</th>
                        <th>Type</th>
                        <th>R:R</th>
                        <th>Outcome</th>
                        <th>Notes</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody id="tradeLogBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const tradeForm = document.getElementById('tradeForm');
    const tradeLogBody = document.getElementById('tradeLogBody');
    let trades = JSON.parse(localStorage.getItem('bintastrade_log')) || [];

    window.addEventListener('load', () => {
        const now = new Date();
        now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
        document.getElementById('date').value = now.toISOString().slice(0, 16);
        renderTrades();
    });

    tradeForm.addEventListener('submit', (e) => {
        e.preventDefault();
        const newTrade = {
            id: Date.now(),
            date: document.getElementById('date').value,
            pair: document.getElementById('pair').value.toUpperCase(),
            direction: document.getElementById('direction').value,
            riskReward: document.getElementById('riskReward').value,
            outcome: document.getElementById('outcome').value,
            notes: document.getElementById('notes').value
        };
        trades.unshift(newTrade);
        localStorage.setItem('bintastrade_log', JSON.stringify(trades));
        renderTrades();
        document.getElementById('riskReward').value = '';
        document.getElementById('notes').value = '';
    });

    function renderTrades() {
        tradeLogBody.innerHTML = '';
        if (trades.length === 0) {
            tradeLogBody.innerHTML = `<tr><td colspan="7" style="text-align: center; color: #94a3b8;">No logged positions yet. Stay disciplined!</td></tr>`;
            return;
        }
        trades.forEach(trade => {
            const tr = document.createElement('tr');
            const formattedDate = new Date(trade.date).toLocaleString([], {month: 'short', day: 'numeric', hour: '2-digit', minute:'2-digit'});
            const directionClass = trade.direction.toLowerCase() === 'buy' ? 'badge buy' : 'badge sell';
            let outcomeClass = '';
            if (trade.outcome === 'Win') outcomeClass = 'outcome-win';
            if (trade.outcome === 'Loss') outcomeClass = 'outcome-loss';

            tr.innerHTML = `
                <td>${formattedDate}</td>
                <td><strong>${trade.pair}</strong></td>
                <td><span class="${directionClass}">${trade.direction}</span></td>
                <td>${trade.riskReward}</td>
                <td><span class="${outcomeClass}">${trade.outcome}</span></td>
                <td style="max-width: 200px; white-space: pre-wrap;">${trade.notes || '-'}</td>
                <td><button class="btn-delete" onclick="deleteTrade(${trade.id})">✕</button></td>
            `;
            tradeLogBody.appendChild(tr);
        });
    }

    window.deleteTrade = function(id) {
        if(confirm("Delete this entry?")) {
            trades = trades.filter(trade => trade.id !== id);
            localStorage.setItem('bintastrade_log', JSON.stringify(trades));
            renderTrades();
        }
    }
</script>
</body>
</html>
